services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: startup-lab-backend
    env_file:
      - .env
    environment:
      - USE_LLM_AGENT=${USE_LLM_AGENT:-false}
    ports:
      - "8001:8001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: startup-lab-frontend
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
    ports:
      - "5173:5173"
